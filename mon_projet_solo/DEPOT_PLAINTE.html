  <div class="box-container">
     <h1 class="box-title">DÉPOSER UNE PLAINTE</h1>
    <p class="box-intro">Merci de remplir ce formulaire pour que nous puissions traiter votre plainte rapidement.</p>

    <form class="complaint-form">
      
      <label for="nom">Nom</label>
      <input type="text" id="nom" class="input-basse" placeholder="Entrez votre nom">

      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" class="input-basse" placeholder="Entrez votre prénom">

      <label for="email">Email</label>
      <input type="email" id="email" class="input-basse" placeholder="Entrez votre email">

      <label for="objet">Objet de la plainte</label>
      <input type="text" id="objet" class="input-basse" placeholder="Ex: Harcèlement scolaire">

      <label for="description">Description de la plainte</label>
      <textarea id="description" class="textarea-basse" rows="5" placeholder="Décrivez votre situation..."></textarea>

      <div class="category-section">
        <p>Type de plainte :</p>
        <label><input type="radio" name="categorie" value="scolaire">  Scolaire</label>
        <label><input type="radio" name="categorie" value="travail">  Travail</label>
        <label><input type="radio" name="categorie" value="internet">  Internet</label>
      </div>

      <button type="connexion" class="connexion-button">Soumettre la plainte</button>
      <p class="help-text">Besoin d’aide ? <a href="#">Contactez-nous</a></p>

    </form>
  </div>
